name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - 
      uses: docker/login-action@v2
      name: Login to Docker Hub
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - uses: actions/checkout@v2 # Checking out the repo
    
    -
      name: Build and push the Docker image
      env:
        username: ${{ secrets.DOCKER_USERNAME }}
      run: 
        docker build . --file Dockerfile --tag "$username/cloudproject-ci-cd:${{github.head_ref}}"
        docker run "$username/cloudproject-ci-cd:${{github.head_ref}}"
        docker push "$username/cloudproject-ci-cd:${{github.head_ref}}"
