name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    -
      name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - uses: actions/checkout@v3
    - name: Build and push the Docker image
      run: 
        docker build . --file Dockerfile --tag ${{secrets.DOCKER_USERNAME}}/cloudproject-ci-cd:${{github.head_ref}}
        docker push ${{secrets.DOCKER_USERNAME}}/cloudproject-ci-cd:${{github.head_ref}}
