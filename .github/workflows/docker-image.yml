name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    -
      name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - 
      name: Build and push the Docker image
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      run: 
        docker build . --file Dockerfile --tag "$DOCKER_USERNAME/cloudproject-ci-cd:${{github.head_ref}}"
        docker run "$DOCKER_USERNAME/cloudproject-ci-cd:${{github.head_ref}}"
        docker push "$DOCKER_USERNAME/cloudproject-ci-cd:${{github.head_ref}}"
